run_name: hnet-online
output_dir: './local_files'
eval_dataset_config_path: './eval_configs/only_4shots.yaml'
include_non_commercial: false
max_num_samples: 10

exporters:
  local:
    export_output_table: true
    output_top_n: 5

online_inference_config:
  provider: vllm-openai
  max_concurrent: 4
  hostname: 127.0.0.1:8000
  model_name: hnet-local
  generation_config:
    temperature: 0.0
    top_p: 1.0
    max_tokens: 2048

default_answer_extract_pattern: "(?s)^(.*?)(?=\\n\\n|\\Z)"

metainfo:
  basemodel_name: hnet
  model_type: external
